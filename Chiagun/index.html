<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <style>
      @font-face {
        font-family: "ArialNarrowLocal";
        src:
          local("Arial Narrow"),
          url("file:///System/Library/Fonts/Supplemental/Arial%20Narrow.ttf")
            format("truetype");
        font-style: normal;
        font-weight: 400;
      }

      :root {
        color-scheme: dark;
        --bg: #000000;
        --text: #f5f5f0;
        --glow: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 30%, #111111 0%, #040404 38%, var(--bg) 72%),
          var(--bg);
        color: var(--text);
        font-family: "ArialNarrowLocal", "Arial Narrow", Arial, sans-serif;
      }

      main {
        text-align: center;
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 3.5rem);
        font-weight: 400;
        letter-spacing: normal;
        text-transform: lowercase;
        text-shadow: 0 0 28px var(--glow);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>coming soon</h1>
    </main>
  </body>
</html>
